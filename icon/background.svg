<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Adaptive-icon background layer: full-bleed square teal→green gradient. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15C0AE"/>
      <stop offset="1" stop-color="#0C9A6E"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
</svg>
